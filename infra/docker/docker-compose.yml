name: ignify

# ============================================================
# IGNIFY - Development Docker Compose
# Run: docker compose up -d
# ============================================================

services:
  # ─── Infrastructure ───────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ignify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ignify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ignify_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-ignify}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ignify}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ignify-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ignify-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ignify}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-ignify_minio_2024}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ../../services/backend
      dockerfile: Dockerfile
    container_name: ignify-backend
    restart: unless-stopped
    command: ["./entrypoint.sh", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ignify}:${POSTGRES_PASSWORD:-ignify_dev_2024}@postgres:5432/${POSTGRES_DB:-ignify}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../services/backend:/app

  # ─── Celery Worker ────────────────────────────────────────
  worker:
    build:
      context: ../../services/backend
      dockerfile: Dockerfile
    container_name: ignify-worker
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ignify}:${POSTGRES_PASSWORD:-ignify_dev_2024}@postgres:5432/${POSTGRES_DB:-ignify}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../services/backend:/app

  # ─── Celery Beat (scheduler) ──────────────────────────────
  worker-beat:
    build:
      context: ../../services/backend
      dockerfile: Dockerfile
    container_name: ignify-worker-beat
    restart: unless-stopped
    command: celery -A app.worker beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ignify}:${POSTGRES_PASSWORD:-ignify_dev_2024}@postgres:5432/${POSTGRES_DB:-ignify}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../services/backend:/app

  # ─── Dashboard (Tenant App) ──────────────────────────────
  dashboard:
    build:
      context: ../../dashboard
      dockerfile: Dockerfile.dev
    container_name: ignify-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: Ignify
    ports:
      - "3000:3000"
    volumes:
      - ../../dashboard:/app
      - /app/node_modules

  # ─── Website (Public Site) ───────────────────────────────
  website:
    build:
      context: ../../website
      dockerfile: Dockerfile.dev
    container_name: ignify-website
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: Ignify
      NEXT_PUBLIC_DASHBOARD_URL: http://localhost:3000
    ports:
      - "3010:3000"
    volumes:
      - ../../website:/app
      - /app/node_modules

  # ─── Channel Connectors ──────────────────────────────────
  whatsapp-connector:
    build:
      context: ../../services/whatsapp-connector
      dockerfile: Dockerfile
    container_name: ignify-whatsapp
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - backend
    volumes:
      - whatsapp_sessions:/app/sessions

  messenger-connector:
    profiles: ["channels"]
    build:
      context: ../../services/messenger-connector
      dockerfile: Dockerfile
    container_name: ignify-messenger
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      - backend

  instagram-connector:
    profiles: ["channels"]
    build:
      context: ../../services/instagram-connector
      dockerfile: Dockerfile
    container_name: ignify-instagram
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3006
    ports:
      - "3006:3006"
    depends_on:
      - backend

  email-connector:
    profiles: ["channels"]
    build:
      context: ../../services/email-connector
      dockerfile: Dockerfile
    container_name: ignify-email
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3004
    ports:
      - "3004:3004"
    depends_on:
      - backend

  slack-connector:
    profiles: ["channels"]
    build:
      context: ../../services/slack-connector
      dockerfile: Dockerfile
    container_name: ignify-slack
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3005
    ports:
      - "3005:3005"
    depends_on:
      - backend

  # ─── Gateway ──────────────────────────────────────────────
  gateway:
    profiles: ["gateway"]
    image: nginx:alpine
    container_name: ignify-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - dashboard
      - website

volumes:
  postgres_data:
  redis_data:
  minio_data:
  whatsapp_sessions:
