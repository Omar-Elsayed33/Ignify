name: ignify-prod

# ============================================================
# IGNIFY - Production Docker Compose
# Run: docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: ignify-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ignify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ignify-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ignify-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Entrypoint auto-runs: alembic upgrade head + seed
  backend:
    build:
      context: ../../services/backend
      dockerfile: Dockerfile
    container_name: ignify-backend
    restart: always
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ignify}
      REDIS_URL: redis://redis:6379/0
      AGNO_RUNTIME_URL: http://agno-runtime:8001
      MINIO_ENDPOINT: minio:9000
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agno-runtime:
    build:
      context: ../../services/agno-runtime
      dockerfile: Dockerfile
    container_name: ignify-agno
    restart: always
    env_file:
      - .env.prod

  worker:
    build:
      context: ../../services/backend
      dockerfile: Dockerfile
    container_name: ignify-worker
    restart: always
    command: ["./entrypoint.sh", "celery", "-A", "app.worker", "worker", "--loglevel=info"]
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ignify}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../../dashboard
      dockerfile: Dockerfile
    container_name: ignify-dashboard
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://${APP_HOST}
      NEXT_PUBLIC_APP_NAME: Ignify

  website:
    build:
      context: ../../website
      dockerfile: Dockerfile
    container_name: ignify-website
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://${APP_HOST}
      NEXT_PUBLIC_APP_NAME: Ignify
      NEXT_PUBLIC_DASHBOARD_URL: https://app.${APP_HOST}

  whatsapp-connector:
    build:
      context: ../../services/whatsapp-connector
      dockerfile: Dockerfile
    container_name: ignify-whatsapp
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3001
    depends_on:
      - backend
    volumes:
      - whatsapp_sessions:/app/sessions

  messenger-connector:
    build:
      context: ../../services/messenger-connector
      dockerfile: Dockerfile
    container_name: ignify-messenger
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3003
    depends_on:
      - backend

  instagram-connector:
    build:
      context: ../../services/instagram-connector
      dockerfile: Dockerfile
    container_name: ignify-instagram
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3006
    depends_on:
      - backend

  email-connector:
    build:
      context: ../../services/email-connector
      dockerfile: Dockerfile
    container_name: ignify-email
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3004
    depends_on:
      - backend

  slack-connector:
    build:
      context: ../../services/slack-connector
      dockerfile: Dockerfile
    container_name: ignify-slack
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 3005
    depends_on:
      - backend

  gateway:
    image: nginx:alpine
    container_name: ignify-gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - dashboard
      - website

  certbot:
    image: certbot/certbot
    container_name: ignify-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_data:/var/www/certbot

volumes:
  postgres_data:
  redis_data:
  minio_data:
  whatsapp_sessions:
  certbot_data:
  certbot_certs:
